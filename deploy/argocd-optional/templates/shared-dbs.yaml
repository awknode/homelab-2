apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    chart: postgresql
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: "10.15.1"
    helm:
      parameters:
      - name: env.TZ
        value: "Europe/Berlin"
      valueFiles:
        - /helm-values/shared_dbs.yaml
  destination:
    namespace: shared-dbs
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true