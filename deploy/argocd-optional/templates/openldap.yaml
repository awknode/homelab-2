apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openldap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    chart: openldap-stack-ha
    repoURL: https://jp-gouin.github.io/helm-openldap/
    targetRevision: "2.1.6"
    helm:
      values: |
        env:
          LDAP_DOMAIN: "ldap.internetz.cloud"
          LDAP_ORGANISATION: "loeken"
          LDAP_TLS: "false"
          LDAP_TLS_ENFORCE: "false"
          LDAP_REMOVE_CONFIG_AFTER_SETUP: "true"
          LDAP_READONLY_USER: "false"
          LDAP_READONLY_USER_USERNAME: readonly
          LDAP_READONLY_USER_MASSWORD: password
        replicaCount: 1
        adminPassword: password
        configPassword: password

        persistence:
          storageClass: "freenas-iscsi-csi"
          size: 1Gi
        ltb-passwd:
          ingress:
            enabled: true
            hosts:
              - ltb-passwd.internetz.cloud
            annotations:
              kubernetes.io/ingress.class: "nginx"
              cert-manager.io/cluster-issuer: "letsencrypt-prod"
              external-dns.alpha.kubernetes.io/hostname: "ltb-passwd.internetz.cloud."
              external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
              nginx.ingress.kubernetes.io/auth-url: http://authelia.authelia.svc.cluster.local/api/verify
              nginx.ingress.kubernetes.io/auth-signin: https://auth.internetz.cloud
            tls:
              - secretName: ltb-passwd-tls
                hosts:
                  - ltb-passwd.internetz.cloud
          ldap:
            server: ldap://openldap-openldap-stack-ha
            searchBase: dc=ldap,dc=internetz,dc=cloud
            bindDN: cn=admin,dc=ldap,dc=internetz,dc=cloud
            bindPWKey: LDAP_ADMIN_PASSWORD

        phpldapadmin:
          ingress:
            annotations:
              kubernetes.io/ingress.class: "nginx"
              cert-manager.io/cluster-issuer: "letsencrypt-prod"
              external-dns.alpha.kubernetes.io/hostname: "ldap-admin.internetz.cloud."
              external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
              nginx.ingress.kubernetes.io/auth-url: http://authelia.authelia.svc.cluster.local/api/verify
              nginx.ingress.kubernetes.io/auth-signin: https://auth.internetz.cloud
            hosts:
              - ldap-admin.internetz.cloud
            tls:
              - secretName: phpldapadmin-tls
                hosts:
                - ldap-admin.internetz.cloud
          env:
            PHPLDAPADMIN_LDAP_HOSTS: "ldap://openldap-openldap-stack-ha:389"
            PHPLDAPADMIN_HTTPS: "false"
            PHPLDAPADMIN_TRUST_PROXY_SSL: "true"
  destination:
    namespace: openldap
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
