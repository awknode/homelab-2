apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bitwardenrs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    chart: vaultwarden
    repoURL: https://k8s-at-home.com/charts/
    targetRevision: "4.0.0"
    helm:
      parameters:
      - name: env.TZ
        value: "Europe/Berlin"
      valueFiles:
        - /helm-values/bitwarden.yaml
  destination:
    namespace: bitwardenrs
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
