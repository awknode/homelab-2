apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: overseer
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    chart: overseer
    repoURL: https://k8s-at-home.com/charts/
    targetRevision: "5.2.0"
    helm:
      valueFiles:
        - /helm-values/overseer.yaml
  destination:
    namespace: sonar
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
