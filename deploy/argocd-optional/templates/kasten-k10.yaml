apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k10
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    chart: "k10"
    repoURL: https://charts.kasten.io/
    targetRevision: "4.5.6"
    # helm:
    #   valueFiles:
    #     - /helm-values/k10.yaml
  destination:
    namespace: kasten-io
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
