apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k10
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    chart: k10
    repoURL: https://charts.kasten.io/
    targetRevision: "4.5.5"
    helm:
      values: |
        global:
          persistence:
            storageClass: "freenas-iscsi-csi"
  destination:
    namespace: kasten-io
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
