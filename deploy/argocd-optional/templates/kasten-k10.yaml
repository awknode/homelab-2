apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k10
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    chart: k10
    repoURL: https://charts.kasten.io/
    targetRevision: "4.5.6"
    helm:
      valueFiles:
        - /helm-values/k10.yaml
  destination:
    namespace: kasten-io
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true


ingress:
  create: true
  tls:
    enabled: true
    secretName: "k10-tls"
  host: "k10.internetz.me"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/hostname: "k10.internetz.me."
    nginx.ingress.kubernetes.io/auth-url: "http://authelia.authelia.svc.cluster.local/api/verify"
    nginx.ingress.kubernetes.io/auth-signin: "https://auth.internetz.me"
auth:
  tokenAuth:
    enabled: true
executorReplicas: 1